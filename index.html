<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaseCheck - IMEI & Serial Number Checker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="container">

        <div class="logo">
            <h1>BaseCheck</h1>
            <p>Know Everything About Your Device</p>
        </div>

        <div class="search-box">

            <input
                type="text"
                id="imei"
                placeholder="Enter IMEI or Serial Number">

            <button id="checkBtn">
                🔍 Check Device
            </button>

        </div>

        <div class="divider">
            <span>OR</span>
        </div>

        <div class="actions">

            <button class="secondary">
                📷 Scan IMEI
            </button>

            <button class="secondary">
                🖼 Upload Photo
            </button>

            <button class="secondary">
                📋 Paste IMEI
            </button>

        </div>

    </main>

    <script src="script.js"></script>

</body>
</html>
