<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaseCheck - IMEI & Serial Number Checker</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,Helvetica,sans-serif;
        }

        body{
            background:#f5f7fb;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .card{
            width:420px;
            max-width:95%;
            background:white;
            border-radius:25px;
            padding:40px;
            text-align:center;
            box-shadow:0 20px 50px rgba(0,0,0,.1);
        }

        h1{
            font-size:42px;
            color:#0066ff;
            margin-bottom:10px;
        }

        p{
            color:#777;
            margin-bottom:35px;
        }

        input{
            width:100%;
            padding:18px;
            border-radius:14px;
            border:2px solid #ddd;
            font-size:18px;
            outline:none;
        }

        input:focus{
            border-color:#0066ff;
        }

        button{
            width:100%;
            margin-top:18px;
            padding:18px;
            border:none;
            border-radius:14px;
            background:#0066ff;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:.2s;
        }

        button:hover{
            background:#0051cc;
        }

        .or{
            margin:30px 0;
            color:#999;
        }

        .small-btn{
            background:white;
            color:#222;
            border:2px solid #ddd;
            margin-top:12px;
        }

        .small-btn:hover{
            background:#f3f3f3;
        }
    </style>
</head>

<body>

<div class="card">

<h1>BaseCheck</h1>

<p>Know Everything About Your Device</p>

<input
type="text"
placeholder="Enter IMEI or Serial Number">

<button>🔍 Check</button>

<div class="or">──────── OR ────────</div>

<button class="small-btn">📷 Scan IMEI</button>

<button class="small-btn">🖼 Upload Photo</button>

<button class="small-btn">📋 Paste IMEI</button>

</div>

</body>
</html>
